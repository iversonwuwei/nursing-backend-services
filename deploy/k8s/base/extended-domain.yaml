apiVersion: apps/v1
kind: Deployment
metadata:
  name: nursing-staffing
  labels:
    app.kubernetes.io/name: nursing-staffing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nursing-staffing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nursing-staffing
        app.kubernetes.io/part-of: nursing-platform
        app.kubernetes.io/tier: domain
    spec:
      containers:
        - name: staffing
          image: ghcr.io/example/nursing-backend/staffing:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: nursing-platform-config
            - secretRef:
                name: nursing-platform-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nursing-staffing
spec:
  selector:
    app.kubernetes.io/name: nursing-staffing
  ports:
    - port: 8080
      targetPort: 8080
---
