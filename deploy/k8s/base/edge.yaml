apiVersion: apps/v1
kind: Deployment
metadata:
  name: nursing-api-gateway
  labels:
    app.kubernetes.io/name: nursing-api-gateway
    app.kubernetes.io/part-of: nursing-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nursing-api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nursing-api-gateway
        app.kubernetes.io/part-of: nursing-platform
        app.kubernetes.io/tier: edge
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/example/nursing-backend/api-gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: nursing-platform-config
            - secretRef:
                name: nursing-platform-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nursing-api-gateway
spec:
  selector:
    app.kubernetes.io/name: nursing-api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
