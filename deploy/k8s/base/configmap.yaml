apiVersion: v1
kind: ConfigMap
metadata:
  name: nursing-platform-config
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
data:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:8080
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_SERVICE_NAMESPACE: nursing-platform
  OTEL_UPSTREAM_OTLP_ENDPOINT: tempo.monitoring.svc.cluster.local:4317
  OTEL_COLLECTOR_DEBUG_VERBOSITY: basic
  Monitoring__DashboardUrl: https://replace-with-real-grafana.example.com/d/nursing-platform
  Monitoring__AlertRouteName: replace-with-real-alertmanager-route
  ProviderCallbacks__SharedKeyHeaderName: X-Provider-Webhook-Key
  ProviderCallbacks__AllowSharedKeyFallback: "true"
  ProviderCallbacks__DefaultProfile__Provider: default
  ProviderCallbacks__DefaultProfile__SignatureMode: HmacSha256
  ProviderCallbacks__DefaultProfile__SignatureEncoding: HexLower
  ProviderCallbacks__DefaultProfile__SignaturePayloadMode: TimestampDotBody
  ProviderCallbacks__DefaultProfile__SignatureHeaderName: X-Provider-Signature
  ProviderCallbacks__DefaultProfile__TimestampHeaderName: X-Provider-Timestamp
  ProviderCallbacks__DefaultProfile__TimestampToleranceSeconds: "300"
  ProviderCallbacks__Profiles__0__Provider: twilio
  ProviderCallbacks__Profiles__0__SignatureMode: HmacSha256
  ProviderCallbacks__Profiles__0__SignatureEncoding: HexLower
  ProviderCallbacks__Profiles__0__SignaturePayloadMode: TimestampDotBody
  ProviderCallbacks__Profiles__0__SignatureHeaderName: X-Twilio-Signature
  ProviderCallbacks__Profiles__0__TimestampHeaderName: X-Twilio-Timestamp
  ProviderCallbacks__Profiles__0__TimestampToleranceSeconds: "300"
  ProviderCallbacks__Profiles__0__ChannelOverride: sms
  ProviderCallbacks__Profiles__0__StatusMappings__queued: Queued
  ProviderCallbacks__Profiles__0__StatusMappings__delivered: Delivered
  ProviderCallbacks__Profiles__0__StatusMappings__failed: Failed
  ProviderCallbacks__Profiles__0__StatusMappings__undelivered: Failed
  ProviderCallbacks__Profiles__1__Provider: email-hmac-base64
  ProviderCallbacks__Profiles__1__SignatureMode: HmacSha256
  ProviderCallbacks__Profiles__1__SignatureEncoding: Base64
  ProviderCallbacks__Profiles__1__SignaturePayloadMode: Body
  ProviderCallbacks__Profiles__1__SignaturePrefix: sha256=
  ProviderCallbacks__Profiles__1__SignatureHeaderName: X-Provider-Signature
  ProviderCallbacks__Profiles__1__TimestampHeaderName: X-Provider-Timestamp
  ProviderCallbacks__Profiles__1__TimestampToleranceSeconds: "0"
  ProviderCallbacks__Profiles__1__ChannelOverride: email
  ProviderCallbacks__Profiles__1__StatusMappings__accepted: Queued
  ProviderCallbacks__Profiles__1__StatusMappings__processed: Delivered
  ProviderCallbacks__Profiles__1__StatusMappings__dropped: Failed
  ProviderCallbacks__Profiles__1__StatusMappings__bounced: Failed
  Jwt__Issuer: nursing-platform
  Jwt__Audience: nursing-platform-clients
  Outbox__DispatchInlineOnWrite: "false"
  Outbox__BatchSize: "20"
  RabbitMq__Host: rabbitmq.default.svc.cluster.local
  RabbitMq__Port: "5672"
  RabbitMq__UserName: nursing
  RabbitMq__Exchange: nursing.domain.events
  RabbitMq__Queue: nursing.notification.events
  RabbitMq__RetryExchange: nursing.domain.events.retry
  RabbitMq__RetryQueue: nursing.notification.events.retry
  RabbitMq__DeadLetterExchange: nursing.domain.events.dead
  RabbitMq__DeadLetterQueue: nursing.notification.events.dead
  RabbitMq__RetryIntervalSeconds: "15"
  RabbitMq__MetricsIntervalSeconds: "15"
  RabbitMq__MaxRetryAttempts: "3"
  RabbitMq__PublishIntervalSeconds: "5"
  RabbitMq__BatchSize: "20"
  ServiceEndpoints__Identity: http://nursing-identity:8080
  ServiceEndpoints__Tenant: http://nursing-tenant:8080
  ServiceEndpoints__Elder: http://nursing-elder:8080
  ServiceEndpoints__Care: http://nursing-care:8080
  ServiceEndpoints__Health: http://nursing-health:8080
  ServiceEndpoints__Visit: http://nursing-visit:8080
  ServiceEndpoints__Billing: http://nursing-billing:8080
  ServiceEndpoints__Notification: http://nursing-notification:8080