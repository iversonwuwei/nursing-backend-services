apiVersion: v1
kind: Secret
metadata:
  name: nursing-platform-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
type: Opaque
stringData:
  Jwt__SigningKey: replace-with-strong-signing-key
  ConnectionStrings__Postgres: Host=postgres-rw.default.svc.cluster.local;Port=5432;Database=nursing_platform;Username=nursing;Password=replace-me
  RabbitMq__Password: replace-rabbitmq-password
  ProviderCallbacks__SharedKey: replace-provider-webhook-key
  ProviderCallbacks__DefaultProfile__SignatureSecret: replace-default-provider-signature-secret
  ProviderCallbacks__Profiles__0__SignatureSecret: replace-twilio-signature-secret
  ProviderCallbacks__Profiles__1__SignatureSecret: replace-email-provider-signature-secret
  OTEL_UPSTREAM_OTLP_AUTHORIZATION: Bearer replace-with-real-otlp-token
  InternalServiceAuth__ApiKey: replace-internal-service-key