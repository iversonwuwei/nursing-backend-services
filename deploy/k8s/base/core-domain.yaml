apiVersion: apps/v1
kind: Deployment
metadata:
  name: nursing-identity
  labels:
    app.kubernetes.io/name: nursing-identity
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nursing-identity
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nursing-identity
        app.kubernetes.io/part-of: nursing-platform
        app.kubernetes.io/tier: domain
    spec:
      containers:
        - name: identity
          image: ghcr.io/example/nursing-backend/identity:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: nursing-platform-config
            - secretRef:
                name: nursing-platform-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nursing-identity
spec:
  selector:
    app.kubernetes.io/name: nursing-identity
  ports:
    - port: 8080
      targetPort: 8080
---
