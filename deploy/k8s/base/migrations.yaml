apiVersion: batch/v1
kind: Job
metadata:
  name: nursing-database-migrator
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/name: nursing-database-migrator
    app.kubernetes.io/part-of: nursing-platform
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nursing-database-migrator
        app.kubernetes.io/part-of: nursing-platform
    spec:
      restartPolicy: OnFailure
      containers:
        - name: database-migrator
          image: ghcr.io/example/nursing-backend/database-migrator:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: nursing-platform-config
            - secretRef:
                name: nursing-platform-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi