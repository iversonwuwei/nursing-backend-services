apiVersion: apps/v1
kind: Deployment
metadata:
  name: nursing-event-worker
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: nursing-event-worker
    app.kubernetes.io/part-of: nursing-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nursing-event-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nursing-event-worker
        app.kubernetes.io/part-of: nursing-platform
        app.kubernetes.io/tier: worker
    spec:
      containers:
        - name: event-worker
          image: ghcr.io/example/nursing-backend/event-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: nursing-platform-config
            - secretRef:
                name: nursing-platform-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 600m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "true"]
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "true"]