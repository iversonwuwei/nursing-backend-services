apiVersion: v1
kind: ConfigMap
metadata:
  name: nursing-otel-collector-config
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: nursing-platform
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:

    exporters:
      prometheus:
        endpoint: 0.0.0.0:9464
      debug:
        verbosity: ${env:OTEL_COLLECTOR_DEBUG_VERBOSITY}
      otlp/upstream:
        endpoint: ${env:OTEL_UPSTREAM_OTLP_ENDPOINT}
        headers:
          authorization: ${env:OTEL_UPSTREAM_OTLP_AUTHORIZATION}

    service:
      telemetry:
        logs:
          level: info
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug, otlp/upstream]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus, debug, otlp/upstream]