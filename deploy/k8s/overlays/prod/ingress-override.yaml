apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nursing-platform-ingress
spec:
  tls:
    - hosts:
        - api.nursing.example.com
      secretName: nursing-platform-tls
  rules:
    - host: api.nursing.example.com
      http:
        paths:
          - path: /api/gateway
            pathType: Prefix
            backend:
              service:
                name: nursing-api-gateway
                port:
                  number: 8080
          - path: /api/admin
            pathType: Prefix
            backend:
              service:
                name: nursing-admin-bff
                port:
                  number: 8080
          - path: /api/family
            pathType: Prefix
            backend:
              service:
                name: nursing-family-bff
                port:
                  number: 8080
          - path: /api/nani
            pathType: Prefix
            backend:
              service:
                name: nursing-nani-bff
                port:
                  number: 8080