apiVersion: apps/v1
kind: Deployment
metadata:
  name: nursing-api-gateway
spec:
  template:
    spec:
      containers:
        - name: api-gateway
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nursing-care
spec:
  template:
    spec:
      containers:
        - name: care
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1200m
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nursing-notification
spec:
  template:
    spec:
      containers:
        - name: notification
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1200m
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nursing-event-worker
spec:
  template:
    spec:
      containers:
        - name: event-worker
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi