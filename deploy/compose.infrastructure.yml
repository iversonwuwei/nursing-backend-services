services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nursing_platform
      POSTGRES_USER: nursing
      POSTGRES_PASSWORD: nursing
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"

  seq:
    image: datalust/seq:2024.3
    environment:
      ACCEPT_EULA: Y
    ports:
      - "5341:5341"
      - "8081:80"

volumes:
  postgres-data: